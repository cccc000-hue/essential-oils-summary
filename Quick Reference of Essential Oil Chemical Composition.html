        function getCautionType(caution) {
            if (!caution) return 'none';
            if (caution.includes('安全') || caution.includes('無光敏') || caution.includes('無毒') || caution.includes('不具光敏')) return 'safe';
            return 'warn';
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            document.getElementById('resultCount').textContent = `共 ${data.length} 筆成分`;

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-gray-400 py-10">找不到相關成分</td></tr>';
                return;
            }

            data.forEach((item, idx) => {
                const mainRow = document.createElement('tr');
                mainRow.className = `main-row ${idx % 2 === 0 ? 'bg-white' : 'bg-gray-50/50'} ${item.rowClass} border-b border-gray-100`;
                mainRow.setAttribute('data-idx', idx);
                mainRow.onclick = function() { toggleDetail(idx, this); };

                const topSources = item.sources.slice(0, 3);
                const moreCount = item.sources.length - 3;
                let sourcesHtml = topSources.map(s => 
                    `<span class="src-chip"><span class="font-medium text-gray-700">${s.oil}</span><span class="pct">${s.pct}</span></span>`
                ).join('');
                if (moreCount > 0) {
                    sourcesHtml += `<span class="src-chip text-gray-400">+${moreCount} 更多</span>`;
                }
                if (item.sources.length === 0) {
                    sourcesHtml = '<span class="text-gray-300 text-xs">—</span>';
                }

                const effectsShort = item.effects.slice(0, 4).map(e => {
                    const short = e.length > 12 ? e.substring(0, 12) + '…' : e;
                    return `<span class="effect-pill">${short}</span>`;
                }).join('');

                mainRow.innerHTML = `
                    <td class="px-3 py-3 text-gray-400"><span class="expand-icon" id="icon-${idx}">▶</span></td>
                    <td class="px-4 py-3">

                        <div class="text-xs text-gray-400 mt-0.5">${item.subFamily}</div>
                    </td>
                    <td class="px-4 py-3"><span class="family-tag ft-${item.family}">${item.family}</span></td>
                    <td class="px-4 py-3 hide-mobile"><div class="flex flex-wrap gap-0.5">${effectsShort}</div></td>
                    <td class="px-4 py-3"><div class="flex flex-wrap">${sourcesHtml}</div></td>
                `;
                tbody.appendChild(mainRow);

                // Detail row
                const detailRow = document.createElement('tr');
                detailRow.className = 'detail-row bg-gray-50';
                detailRow.id = `detail-${idx}`;

                let detailSources = '';

                tbody.appendChild(detailRow);

        function toggleDetail(idx, mainRowEl) {
            const detail = document.getElementById(`detail-${idx}`);
            const icon = document.getElementById(`icon-${idx}`);
            const isOpen = detail.classList.contains('open');

            document.querySelectorAll('.detail-row.open').forEach(d => d.classList.remove('open'));
            document.querySelectorAll('.expand-icon.rotated').forEach(i => i.classList.remove('rotated'));
            document.querySelectorAll('.main-row.active-row').forEach(r => r.classList.remove('active-row'));

            if (!isOpen) {
                detail.classList.add('open');
                icon.classList.add('rotated');
                mainRowEl.classList.add('active-row');
            }
        }

        function sortTable(key) {
            sortAsc = !sortAsc;
            currentData.sort((a, b) => {
                const va = a.name.toLowerCase();
                const vb = b.name.toLowerCase();
                return sortAsc ? va.localeCompare(vb, 'zh-Hant') : vb.localeCompare(va, 'zh-Hant');
            });
            renderTable(currentData);
        }

        window.filterFamily = function(family, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('btn-active'));
            btn.classList.add('btn-active');

            if (family === 'all') {
                currentData = [...chemicalData];
            } else {
                currentData = chemicalData.filter(item => item.family === family);
            }
            renderTable(currentData);
        };

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            currentData = chemicalData.filter(item =>
                item.name.toLowerCase().includes(term) ||
                item.enName.toLowerCase().includes(term) ||
                (item.desc && item.desc.toLowerCase().includes(term)) ||
                item.effects.some(eff => eff.toLowerCase().includes(term)) ||
                item.sources.some(src => src.oil.toLowerCase().includes(term) || src.latin.toLowerCase().includes(term))
            );
            renderTable(currentData);
        });

        renderTable(currentData);
    </script>
