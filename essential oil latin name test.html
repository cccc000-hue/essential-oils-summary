            init() {
                try {
                    const test = '__storage_test__';
                    window.localStorage.setItem(test, test);
                    window.localStorage.removeItem(test);
                    this._isAvailable = true;
                } catch (e) {
                    this._isAvailable = false;
                    document.getElementById('storage-warning').classList.remove('hidden');
                }
            },
            getItem(key) { return this._isAvailable ? window.localStorage.getItem(key) : (this._memory[key] || null); },
            setItem(key, value) { this._isAvailable ? window.localStorage.setItem(key, value) : (this._memory[key] = value); },

            init() {
                SafeStorage.init();
                this.loadMistakes();
                this.updateHomeStats();
                
                this.els.input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        if (!this.els.btnSubmit.classList.contains('hidden')) {
                            this.checkAnswer();
                        } else {
                            this.nextQuestion();
                        }
                    }
                });
            },

            loadMistakes() {
                const saved = SafeStorage.getItem('latin_mistakes_v1');
                if (saved) {
                    try { this.state.mistakeBank = new Set(JSON.parse(saved)); } catch(e) { this.state.mistakeBank = new Set(); }
                }
            },

            saveMistakes() {
                SafeStorage.setItem('latin_mistakes_v1', JSON.stringify([...this.state.mistakeBank]));
                this.updateHomeStats();
            },

            resetMemory() {
                if(confirm("確定要清除所有錯題記憶嗎？")) {
                    this.state.mistakeBank.clear();
                    this.saveMistakes();
                    location.reload();
                }
            },

            updateHomeStats() {
                this.els.statTotal.textContent = DB.length;
                const wrongCount = this.state.mistakeBank.size;
                this.els.statWrong.textContent = wrongCount;
                if (wrongCount > 0) {
                    this.els.btnReview.classList.remove('hidden');
                    this.els.btnReview.querySelector('.font-bold').textContent = `複習 ${wrongCount} 個需加強題目`;
                } else {
                    this.els.btnReview.classList.add('hidden');
                }
            },

            goHome() {
                this.els.result.classList.add('hidden');
                this.els.quiz.classList.add('hidden');
                this.els.home.classList.remove('hidden');
                this.els.progressContainer.classList.add('hidden');
                this.updateHomeStats();
            },

            startQuiz(mode) {
                this.state.mode = mode;
                this.state.score = 0;
                this.state.currentIdx = 0;
                let indices = mode === 'all' ? DB.map((_, i) => i) : [...this.state.mistakeBank];
                this.state.queue = indices.sort(() => Math.random() - 0.5);
                
                this.els.home.classList.add('hidden');
                this.els.result.classList.add('hidden');
                this.els.quiz.classList.remove('hidden');
                this.els.progressContainer.classList.remove('hidden');
                this.renderQuestion();
            },

            renderQuestion() {
                const dbIndex = this.state.queue[this.state.currentIdx];
                const q = DB[dbIndex];
                
                this.els.qCurrent.textContent = this.state.currentIdx + 1;
                this.els.qTotal.textContent = this.state.queue.length;
                this.els.progressBar.style.width = `${(this.state.currentIdx / this.state.queue.length) * 100}%`;
                
                this.els.qText.textContent = q.cn;
                
                this.els.input.value = '';
                this.els.input.disabled = false;
                this.els.input.className = "latin-input w-full p-4 text-lg border-2 border-slate-200 rounded-xl focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100 outline-none transition-all placeholder-slate-300 text-slate-800";
                this.els.inputIcon.classList.add('hidden');
                this.els.input.focus();
                
                this.els.feedback.classList.add('hidden');
                this.els.fbCorrect.classList.add('hidden');
                this.els.fbWrong.classList.add('hidden');
                
                this.els.btnSubmit.classList.remove('hidden');
                this.els.btnNext.classList.add('hidden');
                
                document.querySelector('.overflow-y-auto').scrollTop = 0;
            },

            normalize(str) { return str.toLowerCase().trim().replace(/\s+/g, ' '); },

            checkAnswer() {
                const dbIndex = this.state.queue[this.state.currentIdx];
                const q = DB[dbIndex];
                const userVal = this.els.input.value;
                const userNorm = this.normalize(userVal);
                const isCorrect = q.answers.some(ans => this.normalize(ans) === userNorm);
                
                this.els.input.disabled = true;
                this.els.btnSubmit.classList.add('hidden');
                this.els.btnNext.classList.remove('hidden');
                this.els.feedback.classList.remove('hidden');
                this.els.inputIcon.classList.remove('hidden');
                
                this.els.fbEn.textContent = q.en;
                this.els.fbFamily.textContent = q.family;
                this.els.fbChem.textContent = q.chem;
                this.els.fbProp.textContent = q.prop;
                this.els.fbContra.textContent = q.contra;

                if (isCorrect) {
                    this.state.score++;
                    if (this.state.mistakeBank.has(dbIndex)) {
                        this.state.mistakeBank.delete(dbIndex);
                        this.saveMistakes();
                    }
                    this.els.input.classList.remove('border-slate-200');
                    this.els.input.classList.add('border-emerald-500', 'bg-emerald-50', 'text-emerald-800');
                    this.els.inputIcon.innerHTML = `<svg class="text-emerald-500" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
                    
                    this.els.fbCorrect.classList.remove('hidden');
                    this.els.fbCorrectText.textContent = q.answers[0];
                } else {
                    if (!this.state.mistakeBank.has(dbIndex)) {
                        this.state.mistakeBank.add(dbIndex);
                        this.saveMistakes();
                    }
                    this.els.input.classList.remove('border-slate-200');
                    this.els.input.classList.add('border-red-500', 'bg-red-50', 'text-red-800', 'shake');
                    this.els.inputIcon.innerHTML = `<svg class="text-red-500" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
                    
                    this.els.fbWrong.classList.remove('hidden');
                    this.els.fbWrongCorrectText.textContent = q.answers[0];
                    this.els.fbUserText.textContent = userVal || "(未輸入)";
                }

                setTimeout(() => {
                    this.els.feedback.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
            },

            nextQuestion() {
                this.state.currentIdx++;
                if (this.state.currentIdx < this.state.queue.length) {
                    this.renderQuestion();
                } else {
                    this.showResult();
                }
            },

            showResult() {
                this.els.quiz.classList.add('hidden');
                this.els.result.classList.remove('hidden');
                this.els.progressBar.style.width = '100%';
                
                this.els.resScore.textContent = this.state.score;
                this.els.resTotal.textContent = this.state.queue.length;

                const wrongCount = this.state.queue.length - this.state.score;
                this.els.resMsgBox.classList.remove('hidden');
                
                if (this.state.mode === 'review') {
                    this.els.resMsgText.textContent = wrongCount === 0 ? "太棒了！您已經消滅了這批錯題！" : `還有 ${wrongCount} 題需要繼續努力。`;
                } else {
                    this.els.resMsgText.textContent = wrongCount > 0 ? `新增了 ${wrongCount} 個題目到錯題庫。` : "完美！沒有新增任何錯題。";
                }
            }
        };

        app.init();
    </script>
</body>
</html>
