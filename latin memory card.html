<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>精油拉丁學名記憶卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f0fdf4;
            color: #334155;
            overscroll-behavior: none;
        }
        
        /* --- 核心翻卡動畫 CSS (已修復) --- */
        .perspective-1000 { 
            perspective: 1000px; 
        }
        
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        /* 當卡片擁有 card-flipped class 時旋轉 180度 */
        .card-inner.card-flipped {
            transform: rotateY(180deg);
        }

        /* 正反面共同設定 */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden; /* Safari */
            backface-visibility: hidden;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        /* 正面 */
        .card-front {
            background-color: white;
            color: #1f2937;
            z-index: 2;
        }

        /* 背面 (預先旋轉180度，這樣翻過來時才是正的) */
        .card-back {
            background-color: #1e293b; /* slate-800 */
            color: white;
            transform: rotateY(180deg);
            z-index: 1;
            display: flex;
            flex-direction: column;
        }

        /* 其他動畫與滾動條 */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #334155; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #64748b; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="app" class="h-[100dvh] flex flex-col max-w-md mx-auto bg-white shadow-2xl relative overflow-hidden border-x border-slate-100">
        
        <!-- Header -->
        <div class="bg-slate-900 text-white p-3 flex justify-between items-center z-20 shadow-md shrink-0">
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2" onclick="location.reload()">
                    <div class="bg-emerald-500 p-1.5 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                    </div>
                    <div>
                        <h1 class="text-sm font-bold leading-none">精油拉丁記憶卡</h1>
                        <span class="text-[10px] text-slate-400 uppercase tracking-wider">Flashcards Fixed</span>
                    </div>
                </div>
            </div>
            <button onclick="window.app.resetMemory()" class="text-[10px] bg-slate-800 px-2 py-1 rounded border border-slate-700 hover:bg-slate-700 transition-colors">重置進度</button>
        </div>

        <!-- Progress Bar -->
        <div id="progress-container" class="hidden w-full bg-slate-100 h-1.5 shrink-0">
            <div id="progress-bar" class="h-1.5 bg-emerald-500 transition-all duration-300" style="width: 0%"></div>
        </div>

        <!-- Main Content Area -->
        <div class="flex-grow relative overflow-hidden bg-slate-50">

            <!-- 1. HOME SCREEN -->
            <div id="screen-home" class="absolute inset-0 flex flex-col p-6 fade-in overflow-y-auto z-10 bg-slate-50">
                <div class="text-center mt-6 mb-8">
                    <div class="inline-block p-4 bg-white rounded-full shadow-sm mb-4">
                        <svg class="w-12 h-12 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-2">拉丁學名記憶卡</h2>
                    <p class="text-slate-500 text-sm">點擊卡片翻面查看答案<br>自我評估是否記住</p>
                </div>

                <!-- Stats -->
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 text-center">
                        <div class="text-3xl font-bold text-slate-800" id="stat-total">0</div>
                        <div class="text-xs text-slate-400 font-bold uppercase mt-1">總卡片數</div>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 text-center">
                        <div class="text-3xl font-bold text-red-500" id="stat-review">0</div>
                        <div class="text-xs text-red-800 font-bold uppercase mt-1">需複習</div>
                    </div>
                </div>

                <div class="space-y-4 mt-auto pb-8">
                    <button id="btn-review" onclick="window.app.startSession('review')" class="hidden w-full bg-red-500 hover:bg-red-600 text-white p-4 rounded-xl shadow-lg shadow-red-200 active:scale-95 transition-all flex items-center justify-between group">
                        <div class="text-left">
                            <div class="font-bold text-lg">複習陌生卡片</div>
                            <div class="text-red-100 text-xs">針對標記為「忘記」的卡片</div>
                        </div>
                        <svg class="w-6 h-6 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>

                    <button onclick="window.app.startSession('all')" class="w-full bg-slate-800 hover:bg-slate-700 text-white p-4 rounded-xl shadow-lg shadow-slate-200 active:scale-95 transition-all flex items-center justify-between">
                        <div class="text-left">
                            <div class="font-bold text-lg">開始隨機抽卡</div>
                            <div class="text-slate-400 text-xs">全範圍隨機顯示</div>
                        </div>
                        <svg class="w-6 h-6 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </button>
                </div>
            </div>

            <!-- 2. FLASHCARD SCREEN -->
            <div id="screen-card" class="hidden absolute inset-0 flex flex-col p-4 z-20 bg-slate-50">
                
                <!-- Counter -->
                <div class="text-center mb-2 text-sm font-medium text-slate-400 shrink-0">
                    Card <span id="card-current" class="text-slate-800 font-bold">1</span> / <span id="card-total">10</span>
                </div>

                <!-- Card Container (Perspective) -->
                <div class="flex-grow perspective-1000 relative w-full mb-4">
                    <!-- The Card Inner Wrapper -->
                    <div id="flashcard-inner" class="card-inner cursor-pointer">
                        
                        <!-- FRONT (Question) -->
                        <div class="card-face card-front flex flex-col items-center justify-center p-8 border border-slate-200">
                            <div class="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mb-6 text-emerald-500">
                                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            </div>
                            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Chinese Name</h3>
                            <h2 id="card-front-text" class="text-4xl font-bold text-slate-800 leading-tight"></h2>
                            <p class="mt-8 text-xs text-slate-400 animate-pulse">點擊卡片翻面</p>
                        </div>

                        <!-- BACK (Answer) -->
                        <div class="card-face card-back">
                            <!-- Back Header -->
                            <div class="p-5 bg-slate-900 border-b border-slate-700 text-center shrink-0">
                                <h3 class="text-[10px] font-bold text-emerald-400 uppercase mb-1">Latin Name</h3>
                                <p id="card-back-latin" class="text-xl font-mono font-bold text-white leading-tight"></p>
                                <p id="card-back-en" class="text-sm text-slate-400 mt-1 italic"></p>
                            </div>
                            
                            <!-- Back Details (Scrollable) -->
                            <div class="p-5 overflow-y-auto custom-scroll flex-grow text-left space-y-4">
                                <div>
                                    <span class="text-[10px] font-bold bg-emerald-900 text-emerald-300 px-2 py-1 rounded uppercase">科屬</span>
                                    <p id="card-back-family" class="mt-1 text-sm font-medium"></p>
                                </div>
                                <div>
                                    <span class="text-[10px] font-bold bg-indigo-900 text-indigo-300 px-2 py-1 rounded uppercase">化學成份</span>
                                    <p id="card-back-chem" class="mt-1 text-xs text-slate-300 whitespace-pre-line leading-relaxed"></p>
                                </div>
                                <div>
                                    <span class="text-[10px] font-bold bg-blue-900 text-blue-300 px-2 py-1 rounded uppercase">功效</span>
                                    <p id="card-back-prop" class="mt-1 text-xs text-slate-300 whitespace-pre-line leading-relaxed"></p>
                                </div>
                                <div id="contra-container" class="hidden">
                                    <span class="text-[10px] font-bold bg-red-900 text-red-300 px-2 py-1 rounded uppercase">禁忌</span>
                                    <p id="card-back-contra" class="mt-1 text-xs text-red-200 whitespace-pre-line leading-relaxed"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Controls (Only visible when flipped) -->
                <div id="controls" class="h-20 shrink-0 flex gap-3 opacity-0 pointer-events-none transition-opacity duration-300 z-30">
                    <button onclick="window.app.rateCard(false)" class="flex-1 bg-red-100 hover:bg-red-200 text-red-700 rounded-xl font-bold flex flex-col items-center justify-center active:scale-95 transition-transform border border-red-200 shadow-sm">
                        <span class="text-xl mb-1">😓</span>
                        <span class="text-xs">忘記了</span>
                    </button>
                    <button onclick="window.app.rateCard(true)" class="flex-1 bg-emerald-100 hover:bg-emerald-200 text-emerald-700 rounded-xl font-bold flex flex-col items-center justify-center active:scale-95 transition-transform border border-emerald-200 shadow-sm">
                        <span class="text-xl mb-1">😎</span>
                        <span class="text-xs">記住了</span>
                    </button>
                </div>

            </div>

            <!-- 3. RESULT SCREEN -->
            <div id="screen-result" class="hidden absolute inset-0 flex flex-col p-6 text-center fade-in justify-center items-center z-10 bg-slate-50">
                <div class="w-24 h-24 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-6">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h2 class="text-3xl font-bold text-slate-800 mb-2">複習完成！</h2>
                <p id="result-msg" class="text-slate-500 mb-8 max-w-xs mx-auto"></p>
                
                <button onclick="window.app.goHome()" class="w-full max-w-xs bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-transform">
                    返回主選單
                </button>
            </div>

        </div>
    </div>

                prop: "--抗細菌、抗病毒及抗真菌\n-促進傷口癒合、痤瘡、皮膚炎及敏感性紅疹\n-上及下呼吸道感染、鼻竇炎、扁桃腺炎、急性支氣管炎及哮喘\n-強化消炎、止痛、抗組織胺等功效\n-增強免疫能力\n-念珠菌感染",

                chem: "Extra: 酯類: 乙酸牻牛兒酯 15%\nComplete: 倍半萜烯: 大根老鸛草烯 22%",

            },
            {

                prop: "-慰藉、抑鬱、哀傷、深切悲痛、神經緊張及壓力有關的症狀\n-關節炎、痛風、循環不佳、風濕\n-割傷、皸裂皮膚、發炎及過敏情況\n-哮喘、支氣管炎、咳嗽及喉炎\n-寒顫、絞痛",

                prop: "-腸胃脹氣、消化不良、噁心、長期腹瀉、胃口欠佳\n-月經不來、性無能、性冷感，幫助順利生產\n-細菌感染\n-神經痛、精神衰弱\n-關節炎、肌肉酸痛、風濕痛、痛風\n-改善循環",
                contra: "-高劑量使用可能造成反胃、噁心、嘔吐、眩暈及昏睡等中毒症狀"
            },
            { 
                en: "Black Pepper", cn: "黑胡椒", answers: ["Piper nigrum"], family: "胡椒科 胡椒屬", 
                chem: "倍半萜烯: 丁香油烴 (石竹烯) 25%\n單萜烯: 檸檬烯 15%, delta-3-蒈烯 14%",
                prop: "-止痛、殺菌\n-有效促進血液循環、幫助去除瘀青、改善手腳冰冷\n-對關節發炎、扭傷、肌肉疲勞有效\n-改善便秘、腸胃氣脹、食慾不振\n-傷風、流行性感冒、感染及病毒\n-消除脂肪，幫助消化",
                contra: "N/A"
            }
        ];

        // --- SAFE STORAGE ---
        const Storage = {
            getKey: () => 'latin_flashcards_v1',
            getMistakes: () => {
                try {
                    const data = localStorage.getItem(Storage.getKey());
                    return data ? new Set(JSON.parse(data)) : new Set();
                } catch (e) { return new Set(); }
            },
            saveMistakes: (set) => {
                try {
                    localStorage.setItem(Storage.getKey(), JSON.stringify([...set]));
                } catch (e) {}
            },
            clear: () => localStorage.removeItem(Storage.getKey())
        };

        // --- APP LOGIC ---
        const app = {
            state: {
                queue: [],
                currentIndex: 0,
                mistakes: new Set(),
                isFlipped: false,
                sessionMode: 'all', // 'all' or 'review'
                sessionMistakes: 0
            },

            els: {
                home: document.getElementById('screen-home'),
                card: document.getElementById('screen-card'),
                result: document.getElementById('screen-result'),
                progressBar: document.getElementById('progress-bar'),
                progressContainer: document.getElementById('progress-container'),
                statTotal: document.getElementById('stat-total'),
                statReview: document.getElementById('stat-review'),
                btnReview: document.getElementById('btn-review'),
                cardInner: document.getElementById('flashcard-inner'),
                cardFrontText: document.getElementById('card-front-text'),
                cardBackLatin: document.getElementById('card-back-latin'),
                cardBackEn: document.getElementById('card-back-en'),
                cardBackFamily: document.getElementById('card-back-family'),
                cardBackChem: document.getElementById('card-back-chem'),
                cardBackProp: document.getElementById('card-back-prop'),
                cardBackContra: document.getElementById('card-back-contra'),
                contraContainer: document.getElementById('contra-container'),
                controls: document.getElementById('controls'),
                cardCurrent: document.getElementById('card-current'),
                cardTotal: document.getElementById('card-total'),
                resultMsg: document.getElementById('result-msg')
            },

            init() {
                this.state.mistakes = Storage.getMistakes();
                this.updateHomeStats();
                
                // Bind Card Click Event (Better than inline onclick)
                if(this.els.cardInner) {
                    this.els.cardInner.addEventListener('click', (e) => {
                        // Prevent click if clicking on buttons inside the card (if any)
                        if(e.target.tagName === 'BUTTON') return;
                        this.flipCard();
                    });
                }
            },

            updateHomeStats() {
                this.els.statTotal.textContent = DB.length;
                this.els.statReview.textContent = this.state.mistakes.size;
                
                if (this.state.mistakes.size > 0) {
                    this.els.btnReview.classList.remove('hidden');
                } else {
                    this.els.btnReview.classList.add('hidden');
                }
            },

            resetMemory() {
                if(confirm("確定要重置所有學習進度嗎？")) {
                    Storage.clear();
                    location.reload();
                }
            },

            startSession(mode) {
                this.state.sessionMode = mode;
                this.state.currentIndex = 0;
                this.state.sessionMistakes = 0;
                
                let indices = [];
                if (mode === 'review') {
                    indices = [...this.state.mistakes];
                } else {
                    indices = DB.map((_, i) => i);
                }
                
                // Shuffle
                this.state.queue = indices.sort(() => Math.random() - 0.5);

                this.els.home.classList.add('hidden');
                this.els.result.classList.add('hidden');
                this.els.card.classList.remove('hidden');
                this.els.progressContainer.classList.remove('hidden');
                
                this.renderCard();
            },

            renderCard() {
                const idx = this.state.queue[this.state.currentIndex];
                const data = DB[idx];
                
                // Reset Flip State
                this.state.isFlipped = false;
                this.els.cardInner.classList.remove('card-flipped');
                this.els.controls.style.opacity = '0';
                this.els.controls.style.pointerEvents = 'none';

                // Update Progress
                this.els.cardCurrent.textContent = this.state.currentIndex + 1;
                this.els.cardTotal.textContent = this.state.queue.length;
                this.els.progressBar.style.width = `${((this.state.currentIndex + 1) / this.state.queue.length) * 100}%`;

                // Front Content
                this.els.cardFrontText.textContent = data.cn;

                // Back Content
                this.els.cardBackLatin.textContent = data.answers[0];
                this.els.cardBackEn.textContent = data.en;
                this.els.cardBackFamily.textContent = data.family;
                this.els.cardBackChem.textContent = data.chem;
                this.els.cardBackProp.textContent = data.prop;
                
                if (data.contra && data.contra !== "N/A") {
                    this.els.contraContainer.classList.remove('hidden');
                    this.els.cardBackContra.textContent = data.contra;
                } else {
                    this.els.contraContainer.classList.add('hidden');
                }
            },

            flipCard() {
                if (!this.state.isFlipped) {
                    this.state.isFlipped = true;
                    this.els.cardInner.classList.add('card-flipped');
                    
                    // Show controls with slight delay
                    setTimeout(() => {
                        this.els.controls.style.opacity = '1';
                        this.els.controls.style.pointerEvents = 'auto';
                    }, 300);
                }
            },

            rateCard(remembered) {
                const dbIdx = this.state.queue[this.state.currentIndex];
                
                if (remembered) {
                    // Remove from mistakes if it was there
                    if (this.state.mistakes.has(dbIdx)) {
                        this.state.mistakes.delete(dbIdx);
                    }
                } else {
                    // Add to mistakes
                    this.state.mistakes.add(dbIdx);
                    this.state.sessionMistakes++;
                }
                
                Storage.saveMistakes(this.state.mistakes);

                // Next Card
                this.state.currentIndex++;
                if (this.state.currentIndex < this.state.queue.length) {
                    this.renderCard();
                } else {
                    this.showResult();
                }
            },

            showResult() {
                this.els.card.classList.add('hidden');
                this.els.result.classList.remove('hidden');
                this.els.progressContainer.classList.add('hidden');
                
                const total = this.state.queue.length;
                const forgotten = this.state.sessionMistakes;
                const remembered = total - forgotten;
                
                if (forgotten === 0) {
                    this.els.resultMsg.innerHTML = `太棒了！<br>這次複習的 <span class="font-bold text-emerald-600">${total}</span> 張卡片全部都記住了！`;
                } else {
                    this.els.resultMsg.innerHTML = `本次學習 <span class="font-bold">${total}</span> 張卡片。<br>有 <span class="font-bold text-red-500">${forgotten}</span> 張標記為忘記，已加入錯題庫。`;
                }
            },

            goHome() {
                this.els.result.classList.add('hidden');
                this.els.home.classList.remove('hidden');
                this.updateHomeStats();
            }
        };

        // Assign to window to ensure HTML onclick attributes work
        window.app = app;
        app.init();
    </script>
