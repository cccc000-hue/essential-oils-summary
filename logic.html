<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#f0fdf4}
.lt{display:inline-block;padding:2px 8px;border-radius:999px;font-size:.7rem;font-weight:600;white-space:nowrap}

.l2{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}
.l3{background:#dcfce7;color:#166534;border:1px solid #86efac}

.cp-r{background:#fdf2f8;border:1px solid #fbcfe8;color:#9d174d}
.oil-detail{max-height:0;overflow:hidden;transition:max-height .4s ease}
.oil-detail.open{max-height:none}
.filter-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}
.filter-scroll::-webkit-scrollbar{display:none}
.filter-wrap{display:flex;flex-wrap:nowrap;gap:4px;padding-bottom:4px;min-width:max-content}
.filter-wrap.expanded{flex-wrap:wrap;min-width:0}
.fam-btn{flex-shrink:0;padding:4px 10px;border-radius:9999px;font-size:.72rem;background:#fff;color:#6b7280;border:1px solid #e5e7eb;cursor:pointer;transition:all .15s;white-space:nowrap}
.fam-btn:hover{border-color:#6ee7b7}
.fam-btn.active{background:#059669;color:#fff;border-color:#059669;font-weight:700}
.saf-btn{flex-shrink:0;padding:4px 10px;border-radius:9999px;font-size:.72rem;background:#fff;color:#6b7280;border:1px solid #e5e7eb;cursor:pointer;transition:all .15s;white-space:nowrap}
.saf-btn:hover{border-color:#f9a8d4}
.saf-btn.active{background:#e11d48;color:#fff;border-color:#e11d48;font-weight:700}
.saf-section{max-height:0;overflow:hidden;transition:max-height .3s ease,opacity .3s ease;opacity:0}
.saf-section.open{max-height:200px;opacity:1}
.saf-toggle{transition:all .2s}
.saf-toggle.has-active{background:#fff1f2;border-color:#fda4af;color:#e11d48}
.saf-badge{display:none;width:16px;height:16px;border-radius:999px;background:#e11d48;color:#fff;font-size:10px;line-height:16px;text-align:center;position:absolute;top:-4px;right:-4px}

// =============== PARSING & MATCHING ===============
function parseComp(s){
  if(s.startsWith('⚠')||s.includes('檸檬醛 citral =')) return null;
  let str=s.replace(/^(Extra|Complete|蘇門答臘|暹羅)\s*[—:：]\s*/,'');
  if(str.includes('；')){
    return str.split('；').map(part=>parseSingle(part.trim())).filter(x=>x);
  }
  return [parseSingle(str)].filter(x=>x);
}
function parseSingle(str){
  const ci=str.indexOf('：');
  const type=ci>-1?str.substring(0,ci).trim():'';
  const rest=ci>-1?str.substring(ci+1).trim():str.trim();
  const m=rest.match(/^(.+?)\s*[\(（](.+?)[\)）]\s*(.*)$/);
  if(m) return {type,cn:m[1].trim(),en:m[2].trim(),pct:m[3].trim(),raw:str};
  const m2=rest.match(/^(.+?)\s+([\d\.\-<>%]+.*)$/);
  if(m2) return {type,cn:m2[1].trim(),en:'',pct:m2[2].trim(),raw:str};
  return {type,cn:rest,en:'',pct:'',raw:str};
}
function lookupChem(cn){
  if(CM[cn]) return CM[cn];
  for(const k of Object.keys(CM)){
    if(cn.includes(k)||k.includes(cn)) return CM[k];
  }
  return null;
}

const SYN=[
  ["抗菌","殺菌","抗感染","抗微生物","抗細菌"],
  ["止痛","鎮痛","疼痛","痛楚"],
  ["消炎","抗炎","抗發炎","抗紅腫","遏止發炎"],
  ["驅蟲","驅蚊","驅蟲劑"],
  ["助眠","安眠","失眠"],
  ["抗病毒","防病毒"],
  ["抗真菌","抗黴菌"],
  ["黏液","袪痰","化痰","排痰","溶解黏液"],
  ["傷口","癒合","修復","再生"],
  ["鎮靜","安撫","安神","平靜"],
  ["循環","血液","血流"],
  ["利尿","排水","水腫"],
  ["收斂","止血","收縮"],
  ["痤瘡","暗瘡","粉刺"],
];
function synMatch(w1,w2){
  for(const group of SYN){
    const a=group.some(w=>w1.includes(w));
    const b=group.some(w=>w2.includes(w));
    if(a&&b) return true;
  }
  return false;
}
function hasOverlap(t1,t2){
  if(synMatch(t1,t2)) return true;
  for(let i=0;i<t1.length-1;i++){
    const bi=t1.substring(i,i+2);
    if(!/[\u4e00-\u9fff]{2}/.test(bi)) continue;
    if(['的是','及有','與在','可以','用於','有關','引起','使用','功能','效果','問題','情況','作用','相關','幫助','所有','各種','系統','治療','方面'].includes(bi)) continue;
    if(t2.includes(bi)) return true;
  }
  return false;
}
function findSuppReasons(prop, oilChemNames){
  const results=[];
  SUPP.forEach(row=>{
    const [pkStr,ckStr,reason]=row;
    const pks=pkStr.split('|');
    const cks=ckStr.split('|');
    if(!pks.some(k=>prop.includes(k))) return;
    const matchedChems=[];
    cks.forEach(ck=>{
      oilChemNames.forEach(cn=>{
        if((cn.includes(ck)||ck.includes(cn))&&!matchedChems.includes(cn)) matchedChems.push(cn);
      });
    });
    if(matchedChems.length>0) results.push({chems:matchedChems,reason});
  });
  return results;
}

function buildAnalysis(oil){
  const famFuncs=FM[oil.fa]||[];
  const chems=[];
  const chemNames=[];
  oil.c.forEach(s=>{
    const parsed=parseComp(s);
    if(!parsed) return;
    parsed.forEach(p=>{
      if(!p) return;
      const e=lookupChem(p.cn);
      chems.push({...p,effects:e});
      chemNames.push(p.cn);
    });
  });
  const chains=[];
  oil.p.forEach(prop=>{
    const reasons=[];
    famFuncs.forEach(f=>{
      if(f.startsWith('*')) return;
      if(hasOverlap(prop,f)||hasOverlap(f,prop)) reasons.push({layer:'family',text:oil.fa+'→'+f});
    });
    chems.forEach(ch=>{
      if(!ch.effects) return;
      ch.effects.eff.forEach(e=>{
        if(hasOverlap(prop,e)||hasOverlap(e,prop)) reasons.push({layer:'chem',text:ch.cn+(ch.pct?' ('+ch.pct+')':'')+'→'+e});
      });
    });
    if(reasons.length===0){
      const supps=findSuppReasons(prop,chemNames);
      supps.forEach(s=>{
        reasons.push({layer:'ref',text:s.chems.join('、')+'→'+s.reason});
      });
    }
    chains.push({prop,reasons});
  });
  return {famFuncs,chems,chains};
}

    toggle.classList.add('has-active');
    badge.textContent=safActive.size;
    let hintHtml=SAFETY_FILTERS.filter(f=>safActive.has(f.key)).map(f=>`<span class="inline-block text-xs bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded-full mr-1 whitespace-nowrap">${f.icon} ${f.label}</span>`).join('');
    hintHtml+=`<button onclick="clearSafFilters()" class="inline-block text-xs text-gray-400 hover:text-rose-500 px-1 whitespace-nowrap">✕ 清除</button>`;
    hints.innerHTML='<div class="flex items-center gap-0.5 overflow-x-auto" style="scrollbar-width:none">'+hintHtml+'</div>';
  } else {
    toggle.classList.remove('has-active');
    hints.innerHTML='';
  }
}

function doSearch(){
  searchTerm=document.getElementById('search').value.trim().toLowerCase();
  document.getElementById('clearBtn').style.display=searchTerm?'block':'none';
  render();
}
function setFamFilter(v,btn){
  famFilterVal=v;
  document.querySelectorAll('.fam-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function toggleCard(idx){
  const d=document.getElementById('detail-'+idx);
  const a=document.getElementById('arrow-'+idx);
  if(d.classList.contains('open')){d.classList.remove('open');a.textContent='▼';}
  else{d.classList.add('open');a.textContent='▲';setTimeout(()=>d.scrollIntoView({behavior:'smooth',block:'nearest'}),50);}
}

// =============== SAFETY TAG ===============
function getSafetyTags(w){
  if(!w||!w.trim()) return [];
  const tags=[];
  if(/致敏|皮膚刺激|皮膚過敏|引致敏感|引起皮膚|黏膜/.test(w)) tags.push({icon:'✋',label:'皮膚刺激',cls:'bg-orange-100 text-orange-700 border-orange-300'});
  if(/幼兒|兒童|嬰兒|嬰幼兒|小童|小孩|6歲以下|2歲以下/.test(w)) tags.push({icon:'👶',label:'幼兒慎用',cls:'bg-red-100 text-red-700 border-red-300'});
  if(/懷孕|孕婦|通經/.test(w)) tags.push({icon:'🤰',label:'孕婦慎用',cls:'bg-pink-100 text-pink-700 border-pink-300'});
  if(/光敏|紫外光|呋喃香豆素/.test(w)) tags.push({icon:'☀️',label:'光敏性',cls:'bg-yellow-100 text-yellow-700 border-yellow-300'});
  if(/肝毒/.test(w)) tags.push({icon:'🫁',label:'肝毒性',cls:'bg-purple-100 text-purple-700 border-purple-300'});
  if(/神經毒|癲癎|癲癇/.test(w)) tags.push({icon:'🧠',label:'神經毒性',cls:'bg-indigo-100 text-indigo-700 border-indigo-300'});
  return tags;
}

function render(){
  const app=document.getElementById('app');
  let filtered=O;
  if(famFilterVal!=='全部') filtered=filtered.filter(o=>o.fa===famFilterVal);
  if(searchTerm) filtered=filtered.filter(o=>{
    const all=(o.n+' '+o.e+' '+o.la+' '+o.fa+' '+o.p.join(' ')+' '+o.c.join(' ')+' '+(o.w||'')).toLowerCase();
    return all.includes(searchTerm);
  });
  // Apply safety filters
  const totalBefore=filtered.length;
  SAFETY_FILTERS.forEach(sf=>{
    if(safActive.has(sf.key)){
      filtered=filtered.filter(o=>!sf.test(o.w||''));
    }
  });
  const excluded=totalBefore-filtered.length;
  
  let countText='找到 '+filtered.length+' 款精油';
  if(safActive.size>0 && excluded>0) countText+='（已篩除 '+excluded+' 款有禁忌精油）';
  document.getElementById('count').textContent=countText;
  
  if(!filtered.length){app.innerHTML='<div class="text-center py-20 text-gray-400"><div class="text-4xl mb-2">🔍</div>找不到相關精油<br><span class="text-xs">嘗試調整搜尋條件或禁忌篩選</span></div>';return;}
  
  let html='';
  filtered.forEach((oil,idx)=>{
    const a=buildAnalysis(oil);
    const hasW=oil.w&&oil.w.trim();
    const sTags=getSafetyTags(oil.w||'');
    html+=`<div class="oil-card bg-white rounded-xl border border-gray-200 mb-3 overflow-hidden" id="card-${idx}">
      <div class="px-3 sm:px-4 py-3 cursor-pointer hover:bg-emerald-50 transition-colors" onclick="toggleCard(${idx})">
        <div class="flex items-start justify-between gap-2">
          <div class="min-w-0"><div class="flex items-center gap-1.5 flex-wrap"><span class="text-sm sm:text-base font-bold text-gray-800">${oil.n}</span>${!hasW?'<span class="text-xs text-green-500">✅</span>':''}</div><div class="text-xs text-gray-400 truncate">${oil.e}</div></div>
          <div class="text-right flex-shrink-0"><div class="text-xs text-emerald-600 italic hidden sm:block">${oil.la}</div><div class="text-xs text-gray-400">${oil.fa}</div></div>
        </div>
        ${sTags.length?'<div class="flex flex-wrap gap-1 mt-1.5">'+sTags.map(t=>'<span class="inline-flex items-center gap-0.5 text-xs px-1.5 py-0.5 rounded-full border '+t.cls+'">'+t.icon+' '+t.label+'</span>').join('')+'</div>':''}
        <div class="flex items-center gap-2 mt-1"><span class="text-xs text-gray-400">📋 ${oil.p.length}項</span><span class="text-xs text-gray-400">🧪 ${a.chems.length}種</span><span class="text-xs text-gray-400 ml-auto" id="arrow-${idx}">▼</span></div>
      </div>
      <div class="oil-detail border-t border-gray-100" id="detail-${idx}"><div class="px-3 sm:px-4 py-4 space-y-4">
        <div><div class="flex items-center gap-2 mb-2 flex-wrap"><span class="lt l1">第一層</span><span class="text-sm font-bold text-amber-800">🌱 科屬 — ${oil.fa}</span></div>
        <div class="bg-amber-50 rounded-lg p-2.5 sm:p-3 text-sm">${a.famFuncs.length?a.famFuncs.filter(f=>!f.startsWith('*')).map(f=>'<div class="flex items-start gap-2 mb-1"><span class="text-amber-500 flex-shrink-0">▸</span><span class="text-amber-900 text-xs sm:text-sm">'+f+'</span></div>').join(''):'<span class="text-gray-400 text-xs">未收錄此科屬</span>'}</div></div>
        <div><div class="flex items-center gap-2 mb-2"><span class="lt l2">第二層</span><span class="text-sm font-bold text-blue-800">🧪 化學成分</span></div>
        <div class="space-y-2">${a.chems.map(ch=>{const info=ch.effects;return `<div class="bg-blue-50 rounded-lg p-2.5 sm:p-3"><div class="flex items-baseline gap-1.5 mb-1 flex-wrap"><span class="font-bold text-blue-800 text-xs sm:text-sm">${ch.cn}</span>${ch.en?'<span class="text-xs text-blue-400">'+ch.en+'</span>':''}${ch.pct?'<span class="text-xs text-blue-500 font-mono">'+ch.pct+'</span>':''}${info?'<span class="text-xs text-blue-400">['+info.cat+']</span>':''}</div>${info?info.eff.map(e=>'<div class="flex items-start gap-1.5 text-xs text-blue-900 mb-0.5"><span class="text-blue-400 flex-shrink-0">•</span><span>'+e+'</span></div>').join(''):'<div class="text-xs text-gray-400">資料庫中未收錄此成分詳細功效</div>'}${info&&info.w?'<div class="text-xs text-red-500 mt-1">⚠️ '+info.w+'</div>':''}</div>`;}).join('')}</div></div>
        <div><div class="flex items-center gap-2 mb-2"><span class="lt l3">第三層</span><span class="text-sm font-bold text-emerald-800">🔗 底層邏輯推理</span></div>
        <div class="space-y-2.5">${a.chains.map(ch=>{
          return `<div class="chain-box"><div class="font-semibold text-gray-800 text-xs sm:text-sm mb-1.5">📌 ${ch.prop}</div>${ch.reasons.length?ch.reasons.map(r=>{
            const isF=r.layer==='family';
            const isR=r.layer==='ref';
            const cls=isF?'cp-f':isR?'cp-r':'cp-c';
            const icon=isF?'🌱 科屬':isR?'📚 網上資料':'🧪 成分';
            return `<div class="flex items-start gap-1 text-xs mb-1"><span class="cp ${cls}">${icon}</span><span class="text-gray-600 leading-relaxed break-words">${r.text}</span></div>`;
          }).join(''):'<div class="text-xs text-gray-400 italic">（此應用主要基於傳統芳療臨床經驗記載，暫無可對應的成分/科屬機制資料）</div>'}</div>`;
        }).join('')}</div></div>
        ${hasW?`<div class="bg-red-50 border border-red-200 rounded-lg p-2.5 sm:p-3"><div class="text-xs font-bold text-red-700 mb-1">⚠️ 使用禁忌</div><div class="text-xs text-red-700 leading-relaxed">${oil.w}</div>${sTags.length?'<div class="flex flex-wrap gap-1 mt-2">'+sTags.map(t=>'<span class="inline-flex items-center gap-0.5 text-xs px-1.5 py-0.5 rounded-full border '+t.cls+'">'+t.icon+' '+t.label+'</span>').join('')+'</div>':''}</div>`:`<div class="bg-green-50 border border-green-200 rounded-lg p-2.5"><div class="text-xs text-green-700">✅ 無特別使用禁忌（一般安全）</div></div>`}
      </div></div></div>`;
  });
  app.innerHTML=html;
}

// =============== BUILD FILTERS ===============
const allFams=[...new Set(O.map(o=>o.fa))].sort();
const fc=document.getElementById('famFilter');
let fhtml='<button class="fam-btn active" onclick="setFamFilter(\'全部\',this)">全部</button>';
allFams.forEach(f=>{fhtml+=`<button class="fam-btn" onclick="setFamFilter('${f}',this)">${f}</button>`;});
fc.innerHTML=fhtml;

// Build safety filter buttons
const sf=document.getElementById('safFilter');
let sfhtml='';
SAFETY_FILTERS.forEach(f=>{
  sfhtml+=`<button class="saf-btn" data-key="${f.key}" onclick="toggleSaf('${f.key}')" title="${f.desc}"><span>${f.icon}</span> ${f.label}</button>`;
});
sfhtml+=`<button class="saf-btn" onclick="clearSafFilters()" style="background:#f9fafb;color:#9ca3af;border-style:dashed">🗑️ 清除全部</button>`;
sf.innerHTML=sfhtml;

document.getElementById('search').addEventListener('input',doSearch);
render();
</script>
