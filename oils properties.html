        ];

        let currentCategory = "全部";
        let searchQuery = ""; 

        // 3. 渲染分類按鈕
        function renderCategories() {
            const container = document.getElementById('category-container');
            container.innerHTML = '';
            
            CATEGORIES.forEach(cat => {
                const btn = document.createElement('button');
                btn.innerText = cat;
                btn.className = `category-btn flex-shrink-0 px-4 py-2 rounded-full border border-gray-300 text-sm font-medium transition-colors duration-200 ${cat === currentCategory ? 'active' : 'bg-white text-gray-600 hover:bg-gray-50'}`;
                
                // 點擊事件 (加入判斷，如果是拖曳就不觸發點擊)
                btn.onclick = (e) => {
                    if (isDragging) {
                        e.preventDefault();
                        return;
                    }
                    currentCategory = cat;
                    renderCategories();
                    renderOils();
                    
                    // 點擊後讓按鈕自動捲動到可視範圍內
                    btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                };
                container.appendChild(btn);
            });
        }

        // 4. 渲染精油卡片
        function renderOils() {
            const container = document.getElementById('oils-grid');
            container.innerHTML = '';

            const filteredOils = oilsData.filter(oil => {
                const matchCategory = currentCategory === "全部" || oil.categories.includes(currentCategory);
                const query = searchQuery.toLowerCase();
                
                // 檢查名稱、功效或禁忌是否符合搜尋字詞
                const matchSearch = query === "" || 
                                    oil.name.toLowerCase().includes(query) || 
                                    oil.effects.some(effect => effect.toLowerCase().includes(query)) ||
                                    (oil.contraindications && oil.contraindications.some(c => c.toLowerCase().includes(query)));

                return matchCategory && matchSearch;
            });

            if (filteredOils.length === 0) {
                container.innerHTML = `<p class="text-gray-500 col-span-full text-center py-8">找不到符合條件的精油，請嘗試其他關鍵字或分類。</p>`;
                return;
            }

            filteredOils.forEach(oil => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm border border-gray-100 p-5 hover:shadow-md transition-shadow flex flex-col h-full";
                
                const tagsHtml = oil.categories.map(cat => 
                    `<span class="inline-block bg-emerald-50 text-emerald-600 text-xs px-2 py-1 rounded-md mr-1 mb-1">${cat}</span>`
                ).join('');

                const effectsHtml = oil.effects.map(effect => {
                    let displayEffect = effect;
                    if (searchQuery && effect.toLowerCase().includes(searchQuery.toLowerCase())) {
                        const regex = new RegExp(`(${searchQuery})`, 'gi');
                        displayEffect = effect.replace(regex, '<span class="bg-yellow-200 text-gray-900">$1</span>');
                    }
                    return `<li class="text-sm text-gray-600 mb-1 pl-4 relative before:content-['•'] before:absolute before:left-0 before:text-emerald-400">${displayEffect}</li>`;
                }).join('');

                let displayName = oil.name;
                if (searchQuery && oil.name.toLowerCase().includes(searchQuery.toLowerCase())) {
                    const regex = new RegExp(`(${searchQuery})`, 'gi');
                    displayName = oil.name.replace(regex, '<span class="bg-yellow-200 text-gray-900">$1</span>');
                }

                // 處理禁忌區塊
                let contraindicationsHtml = '';
                if (oil.contraindications && oil.contraindications.length > 0) {
                    const cItems = oil.contraindications.map(c => {
                        let displayC = c;
                        if (searchQuery && c.toLowerCase().includes(searchQuery.toLowerCase())) {
                            const regex = new RegExp(`(${searchQuery})`, 'gi');
                            displayC = c.replace(regex, '<span class="bg-yellow-200 text-gray-900">$1</span>');
                        }
                        return `<li class="text-xs mb-1">${displayC}</li>`;
                    }).join('');
                    
                    contraindicationsHtml = `
                        <div class="mt-auto pt-4">
                            <div class="bg-red-50 border border-red-100 rounded-lg p-3">
                                <div class="flex items-center text-red-600 font-bold text-sm mb-1">
                                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                    禁忌與注意事項
                                </div>
                                <ul class="list-disc pl-5 text-red-700 m-0">
                                    ${cItems}
                                </ul>
                            </div>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="flex-grow">
                        <h3 class="text-lg font-bold text-gray-800 mb-2">${displayName}</h3>
                        <div class="mb-3">${tagsHtml}</div>
                        <ul class="list-none m-0 p-0 mb-2">
                            ${effectsHtml}
                        </ul>
                    </div>
                    ${contraindicationsHtml}
                `;
                container.appendChild(card);
            });
        }

        // 5. 綁定搜尋框事件
        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value.trim();
            renderOils();
        });

        // 6. 實作滑鼠拖曳左右滑動功能
        const slider = document.getElementById('category-container');
        let isDown = false;
        let startX;
        let scrollLeft;
        let isDragging = false; // 用來判斷是點擊還是拖曳

        slider.addEventListener('mousedown', (e) => {
            isDown = true;
            isDragging = false;
            slider.classList.add('cursor-grabbing');
            slider.classList.remove('cursor-grab');
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
        });

        slider.addEventListener('mouseleave', () => {
            isDown = false;
            slider.classList.remove('cursor-grabbing');
            slider.classList.add('cursor-grab');
        });

        slider.addEventListener('mouseup', () => {
            isDown = false;
            slider.classList.remove('cursor-grabbing');
            slider.classList.add('cursor-grab');
            // 延遲重置 isDragging，讓 click 事件可以先捕捉到狀態
            setTimeout(() => { isDragging = false; }, 0);
        });

        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 1.5; // 1.5 是滑動速度倍率
            
            // 如果移動距離大於 3px，就視為拖曳而非點擊
            if (Math.abs(walk) > 3) {
                isDragging = true;
            }
            
            slider.scrollLeft = scrollLeft - walk;
        });

        // 初始化
        renderCategories();
        renderOils();
    </script>
